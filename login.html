<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GameJio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .gradient-green-orange {
            background: linear-gradient(135deg, #10b981 0%, #f97316 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <a href="./index.html" class="text-2xl font-bold gradient-green-orange bg-clip-text text-transparent">🎮 GameJio</a>
        </div>
    </nav>

    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">Welcome Back</h1>
            <p class="text-gray-600 text-center mb-8">Login to your GameJio account</p>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                <span id="errorText"></span>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200" placeholder="your@email.com">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200" placeholder="••••••••">
                        <button type="button" class="absolute right-3 top-2.5 text-gray-500 hover:text-gray-700" onclick="togglePassword('password')">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                </div>

                <button type="submit" id="loginBtn" class="w-full py-3 gradient-green-orange text-white font-bold rounded-lg hover:shadow-lg transform hover:scale-105 transition-all duration-200">
                    Login
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
                <div class="flex-1 border-t border-gray-300"></div>
                <span class="text-gray-500 text-sm">or</span>
                <div class="flex-1 border-t border-gray-300"></div>
            </div>

            <!-- Sign Up Link -->
            <p class="text-center text-gray-600">Don't have an account? 
                <a href="./signup.html" class="text-green-600 font-bold hover:text-green-700">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script>
        // Password visibility toggle function
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            
            if (field.type === 'password') {
                field.type = 'text';
            } else {
                field.type = 'password';
            }
        }

        // Supabase is already initialized in auth.js

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMessage');
            const loginBtn = document.getElementById('loginBtn');

            // Check if Supabase is initialized
            const supabase = window.supabaseClient;
            if (!supabase) {
                errorDiv.classList.remove('hidden');
                if (supabaseError) {
                    document.getElementById('errorText').textContent = 'Authentication error: ' + supabaseError;
                } else {
                    document.getElementById('errorText').textContent = 'Authentication service is still loading. Please wait a moment and try again.';
                }
                return;
            }

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                if (data.user) {
                    // Store user session securely (uses auth.js function)
                    storeUserSession(data.user, data.session);
                    
                    // Redirect to home
                    window.location.href = './index.html';
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.classList.remove('hidden');
                document.getElementById('errorText').textContent = error.message || 'Login failed. Please try again.';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });

        // Check if already logged in
        window.addEventListener('load', () => {
            const user = JSON.parse(localStorage.getItem('gamejio_user'));
            if (user) {
                window.location.href = './index.html';
            }
        });
    </script>
</body>
</html>
