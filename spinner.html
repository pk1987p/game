<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Winner Spinner</title>
    <script src="https://cdn.tailwindcss.com"></script>

        [x-cloak] { display: none !important; }
        
        .wheel-container {
            transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* Custom Scrollbar for the long theme list */
        .theme-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        .theme-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }
        .theme-scrollbar::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
        .theme-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #999;
        }
    </style>
</head>

            zinc: { hex: '#71717a', bg: 'bg-[#fafafa]', card: 'border-zinc-200 shadow-zinc-500/10', button: 'bg-zinc-600 hover:bg-zinc-500', accent: 'text-zinc-900', wheelBase: 'bg-zinc-50 border-zinc-100', wheelGlow: 'shadow-[0_0_60px_-15px_rgba(113,113,122,0.3)]', colors: ['#f4f4f5', '#e4e4e7'], text: 'text-zinc-700' },
            stone: { hex: '#78716c', bg: 'bg-[#fafaf9]', card: 'border-stone-200 shadow-stone-500/10', button: 'bg-stone-600 hover:bg-stone-500', accent: 'text-stone-900', wheelBase: 'bg-stone-50 border-stone-100', wheelGlow: 'shadow-[0_0_60px_-15px_rgba(120,113,108,0.3)]', colors: ['#f5f5f4', '#e7e5e4'], text: 'text-stone-700' },
            brown: { hex: '#a16207', bg: 'bg-[#fefce8]', card: 'border-yellow-700/20 shadow-yellow-900/10', button: 'bg-[#a16207] hover:bg-[#854d0e]', accent: 'text-[#451a03]', wheelBase: 'bg-orange-50', wheelGlow: 'shadow-[0_0_60px_-15px_rgba(161,98,7,0.3)]', colors: ['#fef3c7', '#fae8ff'], text: 'text-yellow-900' },

            lavender: { hex: '#c084fc', bg: 'bg-[#faf5ff]', card: 'border-purple-300 shadow-purple-400/20', button: 'bg-[#c084fc] hover:bg-[#a855f7]', accent: 'text-[#581c87]', wheelBase: 'bg-purple-50', wheelGlow: 'shadow-[0_0_60px_-15px_rgba(192,132,252,0.3)]', colors: ['#f3e8ff', '#e9d5ff'], text: 'text-purple-900' },
            crimson: { hex: '#991b1b', bg: 'bg-[#fef2f2]', card: 'border-red-900/20 shadow-red-900/10', button: 'bg-[#991b1b] hover:bg-[#7f1d1d]', accent: 'text-[#450a0a]', wheelBase: 'bg-red-50', wheelGlow: 'shadow-[0_0_60px_-15px_rgba(153,27,27,0.3)]', colors: ['#fee2e2', '#fecaca'], text: 'text-red-900' }

    :class="themes[theme].bg"
    class="min-h-screen p-2 sm:p-4 font-sans flex flex-col items-center justify-center transition-colors duration-500 overflow-hidden"
>

    <div 
        x-data="{
            candidates: [],
            loading: true,
            isSpinning: false,
            showWinner: false,
            winner: null,
            rotation: 0,
            dropdownOpen: false,

            async fetchCandidates() {
                this.loading = true;
                try {
                    this.candidates = Array.from({ length: 24 }, (_, i) => ({
                        id: 100 + i,
                        name: `Candidate ${i + 1}`,
                        photo: `https://i.pravatar.cc/150?u=${i + 100}`
                    }));
                } catch (err) {
                    console.error('Failed to fetch candidates');
                } finally {
                    this.loading = false;
                }
            },

            launchFireworks() {
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            },

            spin() {
                if (this.isSpinning || this.candidates.length === 0) return;
                
                this.isSpinning = true;
                this.showWinner = false;
                this.winner = null;
                this.dropdownOpen = false;
                
                const winnerIndex = Math.floor(Math.random() * this.candidates.length);
                const sectionAngle = 360 / this.candidates.length;
                const extraSpins = 2160; 
                const offset = (winnerIndex * sectionAngle) + (sectionAngle / 2);
                
                this.rotation += extraSpins + (360 - (this.rotation % 360)) - offset;

                setTimeout(() => {
                    this.isSpinning = false;
                    this.winner = this.candidates[winnerIndex];
                    this.showWinner = true;
                    this.launchFireworks();
                }, 6000);
            }
        }"
        x-init="fetchCandidates()"
        class="w-full max-w-2xl bg-white/95 backdrop-blur-3xl border rounded-[2.5rem] sm:rounded-[3.5rem] p-4 sm:p-8 flex flex-col items-center relative overflow-hidden transition-all duration-500"
        :class="themes[theme].card"
    >
        <!-- Theme Selector -->
        <div class="absolute top-4 left-4 sm:top-8 sm:left-10 z-50">
            <div class="relative">
                <button 
                    @click="dropdownOpen = !dropdownOpen"
                    @click.away="dropdownOpen = false"
                    class="flex items-center gap-2 bg-white border border-gray-100 py-1.5 px-2 sm:py-2 sm:px-3 rounded-xl sm:rounded-2xl shadow-sm hover:shadow-md transition-all active:scale-95"
                >
                    <div class="w-4 h-4 sm:w-5 sm:h-5 rounded-full shadow-inner border border-black/5" :style="`background-color: ${themes[theme].hex}`"></div>
                    <i data-lucide="palette" class="w-3 h-3 sm:w-4 sm:h-4 text-gray-400"></i>
                </button>

                <div 
                    x-show="dropdownOpen" 
                    x-cloak 
                    x-transition:enter="transition ease-out duration-200"
                    class="absolute left-0 mt-2 w-12 sm:w-16 max-h-48 sm:max-h-64 bg-white rounded-2xl shadow-2xl border border-gray-50 overflow-y-auto theme-scrollbar z-50 p-1"
                >
                    <template x-for="(t, name) in themes" :key="name">
                        <button 
                            @click="theme = name; dropdownOpen = false"
                            class="w-full flex items-center justify-center py-2 rounded-xl transition-colors"
                            :class="theme === name ? 'bg-gray-100' : 'hover:bg-gray-50'"
                        >
                            <div class="w-4 h-4 sm:w-5 sm:h-5 rounded-full border border-black/5" :style="`background-color: ${t.hex}`"></div>
                        </button>
                    </template>
                </div>
            </div>
        </div>

        <!-- Header -->
        <div class="text-center mb-6 sm:mb-10">
            <h1 class="text-xl sm:text-4xl font-black tracking-tighter uppercase italic leading-none" :class="themes[theme].accent">Winner Draw</h1>
            <p class="font-bold text-[8px] sm:text-[10px] tracking-[0.3em] sm:tracking-[0.4em] uppercase mt-1 sm:mt-3 opacity-40">Elite Participant Ledger</p>
        </div>

        <!-- Spinner Section -->
        <div class="relative w-64 h-64 sm:w-80 md:w-[500px] sm:h-80 md:h-[500px] flex items-center justify-center">
            
            <!-- The Pointer -->
            <div class="absolute -top-3 sm:-top-6 left-1/2 -translate-x-1/2 z-20 drop-shadow-xl" :class="themes[theme].button.replace('bg-', 'text-')">
                <i data-lucide="chevron-down" class="w-8 h-8 sm:w-14 sm:h-14 fill-current"></i>
            </div>

            <!-- The Wheel -->
            <div 
                class="w-full h-full rounded-full border-[6px] sm:border-[12px] border-white relative overflow-hidden wheel-container shadow-2xl"
                :class="[themes[theme].wheelBase, themes[theme].wheelGlow]"
                :style="`transform: rotate(${rotation}deg)`"
            >
                <template x-for="(person, index) in candidates" :key="person.id">
                    <div 
                        class="absolute top-0 left-1/2 w-0.5 h-1/2 origin-bottom flex flex-col items-center"
                        :style="`transform: translateX(-50%) rotate(${(360/candidates.length) * index}deg)`"
                    >
                        <!-- Petal Wedge -->
                        <div 
                            class="absolute top-0 left-1/2 -translate-x-1/2 w-[40px] sm:w-[70px] h-full"
                            :style="`background: ${index % 2 === 0 ? themes[theme].colors[0] : themes[theme].colors[1]}; clip-path: polygon(50% 100%, 0 0, 100% 0);`"
                        ></div>
                        
                        <!-- User ID: Centered within the petal height -->
                        <div class="mt-8 sm:mt-12 flex flex-col items-center justify-center rotate-0">
                            <div class="bg-white/80 backdrop-blur-sm px-1.5 py-0.5 sm:px-3 sm:py-1 rounded-full shadow-sm border border-black/5">
                                <span class="text-[8px] sm:text-[14px] font-black tracking-tight block rotate-90" :class="themes[theme].text" x-text="person.id"></span>
                            </div>
                        </div>
                    </div>
                </template>
                
                <!-- Center Hub -->
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="w-8 h-8 sm:w-20 sm:h-20 bg-white rounded-full z-10 flex items-center justify-center shadow-2xl border-2 sm:border-4" :style="`border-color: ${themes[theme].colors[1]}`">
                        <i data-lucide="sparkles" class="w-4 h-4 sm:w-10 sm:h-10" :style="`color: ${themes[theme].colors[1]}`"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="mt-8 sm:mt-12 w-full flex flex-col items-center gap-6 sm:gap-8">
            <button 
                @click="spin()"
                :disabled="isSpinning || loading"
                class="group relative px-10 sm:px-16 py-3 sm:py-5 rounded-xl sm:rounded-[2rem] overflow-hidden transition-all active:scale-95 disabled:opacity-50 shadow-lg shadow-black/5"
                :class="themes[theme].button"
            >
                <div class="relative z-10 flex items-center gap-2 sm:gap-3 text-white font-black text-sm sm:text-xl tracking-wider uppercase">
                    <i data-lucide="zap" class="w-4 h-4 sm:w-6 sm:h-6 fill-current" :class="isSpinning ? 'animate-pulse' : ''"></i>
                    <span x-text="isSpinning ? 'Spinning...' : 'Draw Winner'"></span>
                </div>
                <div class="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700"></div>
            </button>

            <!-- Winner Display -->
            <div x-show="showWinner" x-cloak x-transition.opacity.duration.500ms class="w-full sm:w-auto flex flex-col items-center p-4 sm:p-8 rounded-[1.5rem] sm:rounded-[3rem] border-2 bg-white shadow-2xl" :style="`border-color: ${themes[theme].colors[1]}`">
                <p class="text-[8px] sm:text-[10px] font-black uppercase tracking-widest mb-3 sm:mb-5 opacity-40">Winner Decided</p>
                <div class="flex items-center gap-3 sm:gap-6">
                    <div class="relative">
                        <img :src="winner?.photo" class="w-12 h-12 sm:w-24 sm:h-24 rounded-xl sm:rounded-[2rem] object-cover shadow-xl border-2 sm:border-4 border-white" alt="Winner">
                        <div class="absolute -bottom-1 -right-1 sm:-bottom-3 sm:-right-3 bg-yellow-400 p-1 sm:p-2 rounded-lg sm:rounded-xl shadow-lg border-2 sm:border-4 border-white">
                            <i data-lucide="star" class="w-2.5 h-2.5 sm:w-5 sm:h-5 text-amber-900 fill-current"></i>
                        </div>
                    </div>
                    <div>
                        <h2 class="text-lg sm:text-4xl font-black tracking-tight" :class="themes[theme].accent" x-text="winner?.name"></h2>
                        <div class="flex items-center gap-2 mt-0.5 sm:mt-2">
                            <span class="px-2 py-0.5 sm:px-4 sm:py-1 rounded-full text-[8px] sm:text-xs font-black text-white uppercase shadow-sm" :style="`background-color: ${themes[theme].hex}`">User #<span x-text="winner?.id"></span></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-3 opacity-30 pb-4">
                <i data-lucide="database" class="w-2 sm:w-3 h-2 sm:h-3"></i>
                <p class="text-[7px] sm:text-[9px] font-bold uppercase tracking-[0.3em] sm:tracking-[0.5em]">
                    Sync: Laravel Secure Stream
                </p>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full h-2 sm:h-3 opacity-30" :style="`background: linear-gradient(to right, ${themes[theme].colors[0]}, ${themes[theme].colors[1]})`"></div>
    </div>

    <script>
        window.addEventListener('load', () => {
            lucide.createIcons();
        });

        document.addEventListener('alpine:init', () => {
            Alpine.effect(() => {
                lucide.createIcons();
            });
        });
    </script>
</body>
</html>
