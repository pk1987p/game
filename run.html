    <!-- Audio Synthesizer Engine -->
    <script>
        const GameAudio = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playSynth(freq, type, duration, slideToFreq = 0) {
                this.init();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                if (slideToFreq > 0) {
                    osc.frequency.exponentialRampToValueAtTime(slideToFreq, this.ctx.currentTime + duration);
                }
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            },
            playJump() {
                this.playSynth(300, 'sine', 0.2, 600);
            },
            playSlide() {
                this.playSynth(500, 'triangle', 0.25, 150);
            },
            playCandy() {
                this.playSynth(880, 'sine', 0.1, 1200);
            },
            playCrash() {
                this.playSynth(180, 'sawtooth', 0.4, 50);
            }
        };
    </script>

    <!-- 3D Gameplay Mechanics -->
    <script>
        // Game State variables
        let scene, camera, renderer;
        let player;
        let worldSpeed = 0.4;
        let maxWorldSpeed = 0.8;
        const roadWidth = 8;
        const laneDistance = 2.4; // Distance between lanes
        const playerZ = 0; // Fixed Z coordinate of our runner
        const baseHeight = 0.5;

        let gameActive = false;
        let distanceScore = 0;
        let collectedCandies = 0;
        let scoreMultiplier = 1;

        // Lane systems: -1 = Left, 0 = Center, 1 = Right
        let currentLane = 0;
        let targetLaneX = 0;
        let isJumping = false;
        let isSliding = false;
        let jumpProgress = 0;
        let slideProgress = 0;

        // Tracks spawned game objects
        let obstacles = [];
        let candies = [];
        let environmentDecoration = [];

        // Mesh elements reference for running animation
        let leftLeg, rightLeg, antennaLeaf, eyesGroup;

        // Canvas container size tracking
        const container = document.getElementById('canvas-container');

        // Create 3D Scene
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#38bdf8'); // Sky Blue
            scene.fog = new THREE.FogExp2('#38bdf8', 0.025);

            camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(0, 5, -6.5); // Position behind the player looking forward
            camera.lookAt(new THREE.Vector3(0, 1.2, 5));

            renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            container.appendChild(renderer.domElement);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);

            const hemi = new THREE.HemisphereLight(0xffffff, 0x15803d, 0.4);
            scene.add(hemi);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(5, 15, -10);
            dirLight.castShadow = true;
            scene.add(dirLight);

            buildTrackGround();
            buildOmNomPlayer();
            spawnProceduralEnvironment(50);
        }

        // Build continuous ground
        let groundPlanes = [];
        function buildTrackGround() {
            // Main road floor
            const roadGeometry = new THREE.PlaneGeometry(roadWidth, 1000);
            const roadMaterial = new THREE.MeshStandardMaterial({ color: '#c084fc', roughness: 0.8 }); // Cute purple run track
            const road = new THREE.Mesh(roadGeometry, roadMaterial);
            road.rotation.x = -Math.PI / 2;
            road.position.set(0, 0, 450);
            scene.add(road);

            // Grass sides
            const grassGeometry = new THREE.PlaneGeometry(100, 1000);
            const grassMaterial = new THREE.MeshStandardMaterial({ color: '#4ade80', roughness: 0.9 });
            const leftGrass = new THREE.Mesh(grassGeometry, grassMaterial);
            leftGrass.rotation.x = -Math.PI / 2;
            leftGrass.position.set(-54, -0.05, 450);
            scene.add(leftGrass);

            const rightGrass = new THREE.Mesh(grassGeometry, grassMaterial);
            rightGrass.rotation.x = -Math.PI / 2;
            rightGrass.position.set(54, -0.05, 450);
            scene.add(rightGrass);

            // Add Lane indicator lines
            for (let i = 0; i < 40; i++) {
                const dashGeometry = new THREE.PlaneGeometry(0.15, 3);
                const dashMaterial = new THREE.MeshBasicMaterial({ color: '#fef08a' }); // soft yellow lines
                
                const leftDash = new THREE.Mesh(dashGeometry, dashMaterial);
                leftDash.rotation.x = -Math.PI / 2;
                leftDash.position.set(laneDistance/2, 0.01, i * 15);
                scene.add(leftDash);
                groundPlanes.push(leftDash);

                const rightDash = new THREE.Mesh(dashGeometry, dashMaterial);
                rightDash.rotation.x = -Math.PI / 2;
                rightDash.position.set(-laneDistance/2, 0.01, i * 15);
                scene.add(rightDash);
                groundPlanes.push(rightDash);
            }
        }

        // Build Om Nom in 3D using basic ThreeJS primitives (Spheres, cylinders, etc.)
        function buildOmNomPlayer() {
            player = new THREE.Group();

            // Main body (Green rounded mass)
            const bodyGeo = new THREE.SphereGeometry(0.8, 16, 16);
            bodyGeo.scale(1, 0.85, 1); // slightly flattened
            const bodyMat = new THREE.MeshStandardMaterial({ color: '#22c55e', roughness: 0.5 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            player.add(body);

            // Giant Eyes
            eyesGroup = new THREE.Group();
            const eyeGeo = new THREE.SphereGeometry(0.3, 12, 12);
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const pupilGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const pupilMat = new THREE.MeshBasicMaterial({ color: 0x000000 });

            // Left Eye
            const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
            leftEye.position.set(-0.25, 0.3, 0.55);
            const leftPupil = new THREE.Mesh(pupilGeo, pupilMat);
            leftPupil.position.set(-0.25, 0.3, 0.8);
            eyesGroup.add(leftEye);
            eyesGroup.add(leftPupil);

            // Right Eye
            const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
            rightEye.position.set(0.25, 0.3, 0.55);
            const rightPupil = new THREE.Mesh(pupilGeo, pupilMat);
            rightPupil.position.set(0.25, 0.3, 0.8);
            eyesGroup.add(rightEye);
            eyesGroup.add(rightPupil);

            player.add(eyesGroup);

            // Cute rosy cheeks
            const cheekGeo = new THREE.SphereGeometry(0.12, 8, 8);
            const cheekMat = new THREE.MeshBasicMaterial({ color: '#ec4899', transparent: true, opacity: 0.6 });
            const leftCheek = new THREE.Mesh(cheekGeo, cheekMat);
            leftCheek.position.set(-0.5, 0.0, 0.55);
            const rightCheek = new THREE.Mesh(cheekGeo, cheekMat);
            rightCheek.position.set(0.5, 0.0, 0.55);
            player.add(leftCheek);
            player.add(rightCheek);

            // Teeth structure inside mouth lines
            const toothGeo = new THREE.ConeGeometry(0.08, 0.15, 4);
            const toothMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const leftTooth = new THREE.Mesh(toothGeo, toothMat);
            leftTooth.rotation.x = Math.PI;
            leftTooth.position.set(-0.2, -0.3, 0.62);
            const rightTooth = new THREE.Mesh(toothGeo, toothMat);
            rightTooth.rotation.x = Math.PI;
            rightTooth.position.set(0.2, -0.3, 0.62);
            player.add(leftTooth);
            player.add(rightTooth);

            // Feet (Left and Right Cylinders that rotate for run visual mechanics)
            const legGeo = new THREE.SphereGeometry(0.2, 8, 8);
            legGeo.scale(1, 0.7, 1);
            const legMat = new THREE.MeshStandardMaterial({ color: '#16a34a' });
            
            leftLeg = new THREE.Mesh(legGeo, legMat);
            leftLeg.position.set(-0.35, -0.7, 0);
            player.add(leftLeg);

            rightLeg = new THREE.Mesh(legGeo, legMat);
            rightLeg.position.set(0.35, -0.7, 0);
            player.add(rightLeg);

            // Antena Leaf Stalk
            const stalkGeo = new THREE.CylinderGeometry(0.02, 0.04, 0.4);
            const stalkMat = new THREE.MeshStandardMaterial({ color: '#15803d' });
            const stalk = new THREE.Mesh(stalkGeo, stalkMat);
            stalk.position.set(0, 0.85, 0);
            player.add(stalk);

            const leafGeo = new THREE.BoxGeometry(0.22, 0.05, 0.35);
            const leafMat = new THREE.MeshStandardMaterial({ color: '#4ade80', roughness: 0.3 });
            antennaLeaf = new THREE.Mesh(leafGeo, leafMat);
            antennaLeaf.position.set(0, 1.05, 0.1);
            antennaLeaf.rotation.x = 0.2;
            player.add(antennaLeaf);

            // Adjust position
            player.position.set(0, baseHeight + 0.3, playerZ);
            scene.add(player);
        }

        // Procedural sweets landscape left/right decoration
        function spawnProceduralEnvironment(range) {
            for (let z = 10; z < range; z += 5) {
                // Left hand Lollipop
                if (Math.random() > 0.4) {
                    const lolly = buildCandyLollipop(Math.random() > 0.5 ? '#f43f5e' : '#a855f7');
                    lolly.position.set(5 + Math.random() * 4, 1.2, z); 
                    scene.add(lolly);
                    environmentDecoration.push(lolly);
                }
                // Right hand Lollipop
                if (Math.random() > 0.4) {
                    const lolly = buildCandyLollipop(Math.random() > 0.5 ? '#fbbf24' : '#3b82f6');
                    lolly.position.set(-5 - Math.random() * 4, 1.2, z); 
                    scene.add(lolly);
                    environmentDecoration.push(lolly);
                }
            }
        }

        function buildCandyLollipop(colorHex) {
            const group = new THREE.Group();

            // Pole
            const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, 2.5);
            const poleMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const pole = new THREE.Mesh(poleGeo, poleMat);
            pole.position.y = -0.5;
            group.add(pole);

            // Swirl head
            const headGeo = new THREE.CylinderGeometry(0.9, 0.9, 0.25, 12);
            headGeo.rotateX(Math.PI / 2);
            const headMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.1 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 0.8;
            group.add(head);

            return group;
        }

        // Spawns obstacle on track
        function spawnObstacle() {
            const laneIndex = Math.floor(Math.random() * 3) - 1; // -1 (left), 0 (center), 1 (right)
            const typeChance = Math.random();

            let obstacleGroup = new THREE.Group();
            let obType = 'barrier'; // barrier, highBarrier, block

            if (typeChance < 0.45) {
                // Low Wooden Barrier (Must Jump!)
                obType = 'barrier';
                const baseGeo = new THREE.BoxGeometry(2.0, 0.6, 0.35);
                const baseMat = new THREE.MeshStandardMaterial({ color: '#ea580c' }); 
                const log = new THREE.Mesh(baseGeo, baseMat);
                log.position.y = 0.3;
                obstacleGroup.add(log);

                // Add left and right hazard legs
                const legGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.6);
                const legMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
                const leftLeg = new THREE.Mesh(legGeo, legMat);
                leftLeg.position.set(-0.9, 0.3, 0);
                const rightLeg = leftLeg.clone();
                rightLeg.position.set(0.9, 0.3, 0);
                obstacleGroup.add(leftLeg);
                obstacleGroup.add(rightLeg);

            } else if (typeChance < 0.8) {
                // High Sweet Arch Barrier (Must Slide!)
                obType = 'highBarrier';
                const arcGeo = new THREE.CylinderGeometry(1.0, 1.0, 0.3, 8);
                arcGeo.rotateX(Math.PI / 2);
                const arcMat = new THREE.MeshStandardMaterial({ color: '#a855f7' }); 
                const arc = new THREE.Mesh(arcGeo, arcMat);
                arc.position.set(0, 1.6, 0);
                obstacleGroup.add(arc);

                // Side pillars
                const poleGeo = new THREE.CylinderGeometry(0.1, 0.1, 1.8);
                const poleMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
                const leftPole = new THREE.Mesh(poleGeo, poleMat);
                leftPole.position.set(-0.9, 0.9, 0);
                const rightPole = leftPole.clone();
                rightPole.position.set(0.9, 0.9, 0);
                obstacleGroup.add(leftPole);
                obstacleGroup.add(rightPole);

            } else {
                // Solid Candy Crate (Must Swap lanes!)
                obType = 'block';
                const crateGeo = new THREE.BoxGeometry(2.0, 1.8, 1.2);
                const crateMat = new THREE.MeshStandardMaterial({ color: '#ef4444', roughness: 0.8 }); 
                const crate = new THREE.Mesh(crateGeo, crateMat);
                crate.position.y = 0.9;
                obstacleGroup.add(crate);

                // Yellow ribbon detail
                const ribGeo = new THREE.BoxGeometry(2.1, 0.2, 1.3);
                const ribMat = new THREE.MeshBasicMaterial({ color: 0xfacc15 });
                const rib = new THREE.Mesh(ribGeo, ribMat);
                rib.position.y = 0.9;
                obstacleGroup.add(rib);
            }

            obstacleGroup.position.set(-laneIndex * laneDistance, 0, 60);
            obstacleGroup.userData = { type: obType, lane: laneIndex, width: 1.8, height: obType === 'highBarrier' ? 1.6 : 0.8 };
            scene.add(obstacleGroup);
            obstacles.push(obstacleGroup);
        }

        // Spawns shiny candy collectibles
        function spawnCandiesChain() {
            const laneIndex = Math.floor(Math.random() * 3) - 1;
            const chainLength = 3 + Math.floor(Math.random() * 4);
            const height = Math.random() > 0.65 ? 1.5 : 0.6; 

            for (let i = 0; i < chainLength; i++) {
                // Wrapper Candy group (striped sphere + side twist cones)
                const candyGroup = new THREE.Group();

                // Swirl middle sphere
                const sphGeo = new THREE.SphereGeometry(0.35, 12, 12);
                const sphMat = new THREE.MeshStandardMaterial({ color: '#f43f5e', roughness: 0.2 }); 
                const mid = new THREE.Mesh(sphGeo, sphMat);
                candyGroup.add(mid);

                // Left twist cone
                const sideGeo = new THREE.ConeGeometry(0.2, 0.35, 6);
                sideGeo.rotateZ(Math.PI / 2);
                const sideMat = new THREE.MeshStandardMaterial({ color: '#fca5a5' });
                const leftCone = new THREE.Mesh(sideGeo, sideMat);
                leftCone.position.x = -0.35;
                const rightCone = leftCone.clone();
                rightCone.rotation.z = -Math.PI;
                rightCone.position.x = 0.35;
                candyGroup.add(leftCone);
                candyGroup.add(rightCone);

                candyGroup.position.set(-laneIndex * laneDistance, height, 60 + (i * 2.2));
                scene.add(candyGroup);
                candies.push(candyGroup);
            }
        }

        // SWAP LANES CONTROL
        function moveLane(direction) {
            if (!gameActive) return;
            let tempLane = currentLane + direction;
            if (tempLane >= -1 && tempLane <= 1) {
                currentLane = tempLane;
                targetLaneX = -currentLane * laneDistance;
                GameAudio.playSynth(450, 'sine', 0.12, 550);
            }
        }

        // ACTION: JUMP
        function triggerJump() {
            if (!gameActive || isJumping || isSliding) return;
            isJumping = true;
            jumpProgress = 0;
            GameAudio.playJump();
        }

        // ACTION: SLIDE (DUCK)
        function triggerSlide() {
            if (!gameActive || isSliding || isJumping) return;
            isSliding = true;
            slideProgress = 0;
            player.scale.set(1.3, 0.4, 1.2);
            GameAudio.playSlide();
        }

        // RESET CURRENT SPREE RUN
        function resetGameSpree() {
            obstacles.forEach(o => scene.remove(o));
            candies.forEach(c => scene.remove(c));
            environmentDecoration.forEach(e => scene.remove(e));

            obstacles = [];
            candies = [];
            environmentDecoration = [];

            currentLane = 0;
            targetLaneX = 0;
            player.position.set(0, baseHeight + 0.3, playerZ);
            player.scale.set(1, 1, 1);
            isJumping = false;
            isSliding = false;

            distanceScore = 0;
            collectedCandies = 0;
            scoreMultiplier = 1;
            worldSpeed = 0.4;

            spawnProceduralEnvironment(70);
            updateScoresHUD();
        }

        function updateScoresHUD() {
            document.getElementById('hud-score').textContent = Math.floor(distanceScore);
            document.getElementById('hud-candies').textContent = collectedCandies;
            document.getElementById('score-multiplier').textContent = scoreMultiplier;
        }

        // Real-time Frame-by-Frame collision checks
        function checkCollisions() {
            const playerBox = new THREE.Box3().setFromObject(player);

            // Crash Obstacles collision
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obstacle = obstacles[i];
                if (obstacle.position.z < 1.2 && obstacle.position.z > -1.2) {
                    const obstacleLane = obstacle.userData.lane;
                    if (obstacleLane === currentLane) {
                        const playerY = player.position.y - baseHeight;
                        
                        if (obstacle.userData.type === 'barrier' && playerY < obstacle.userData.height) {
                            handleCrash();
                            return;
                        }
                        if (obstacle.userData.type === 'highBarrier') {
                            if (!isSliding) {
                                handleCrash();
                                return;
                            }
                        }
                        if (obstacle.userData.type === 'block') {
                            handleCrash();
                            return;
                        }
                    }
                }
            }

            // Candies collection check
            for (let i = candies.length - 1; i >= 0; i--) {
                const candy = candies[i];
                const dx = Math.abs(candy.position.x - player.position.x);
                const dz = Math.abs(candy.position.z - player.position.z);
                const dy = Math.abs(candy.position.y - player.position.y);

                if (dx < 0.9 && dz < 1.0 && dy < 1.2) {
                    scene.remove(candy);
                    candies.splice(i, 1);
                    collectedCandies++;
                    distanceScore += 50 * scoreMultiplier;
                    
                    if (collectedCandies % 10 === 0) {
                        scoreMultiplier++;
                    }

                    GameAudio.playCandy();
                    updateScoresHUD();
                }
            }
        }

        function handleCrash() {
            gameActive = false;
            GameAudio.playCrash();

            // Store highscore
            const savedHighScore = localStorage.getItem('omnom_run_highscore') || 0;
            if (distanceScore > savedHighScore) {
                localStorage.setItem('omnom_run_highscore', Math.floor(distanceScore));
                document.getElementById('global-highscore').textContent = Math.floor(distanceScore).toLocaleString();
            }

            // Animate tumbling back
            let tumbleCount = 0;
            function tumble() {
                if (tumbleCount < 20) {
                    player.rotation.x -= 0.3;
                    player.position.z -= 0.2;
                    player.position.y += 0.1;
                    tumbleCount++;
                    requestAnimationFrame(tumble);
                } else {
                    player.rotation.x = 0;
                    showGameOverScreen();
                }
            }
            tumble();
        }

        // Display results UI
        function showGameOverScreen() {
            document.getElementById('final-score').textContent = Math.floor(distanceScore).toLocaleString();
            document.getElementById('final-candies').textContent = collectedCandies;
            
            const screen = document.getElementById('gameover-screen');
            screen.classList.remove('hidden');
        }

        // CORE ANIMATION RENDER LOOP
        let spawnObstacleTimer = 0;
        let spawnCandyTimer = 0;

        function animate(timestamp) {
            requestAnimationFrame(animate);

            if (gameActive) {
                // Score updates
                distanceScore += worldSpeed * 0.5 * scoreMultiplier;
                updateScoresHUD();

                // Increase speed gradually
                if (worldSpeed < maxWorldSpeed) {
                    worldSpeed += 0.0001;
                }

                // Smooth Lane change interpolation
                player.position.x = THREE.MathUtils.lerp(player.position.x, targetLaneX, 0.22);

                // Run visual cycles legs animation
                const movementFreq = timestamp * 0.015 * (worldSpeed * 2.0);
                leftLeg.rotation.x = Math.sin(movementFreq) * 0.8;
                rightLeg.rotation.x = -Math.sin(movementFreq) * 0.8;
                antennaLeaf.rotation.z = Math.sin(movementFreq * 0.5) * 0.12;

                // Jump Arc calculations
                if (isJumping) {
                    jumpProgress += 0.05;
                    const jumpHeight = 2.4;
                    player.position.y = (baseHeight + 0.3) + Math.sin(jumpProgress * Math.PI) * jumpHeight;
                    
                    if (jumpProgress >= 1.0) {
                        isJumping = false;
                        player.position.y = baseHeight + 0.3;
                    }
                }

                // Slide Squish frame countdown
                if (isSliding) {
                    slideProgress += 0.04;
                    if (slideProgress >= 1.0) {
                        isSliding = false;
                        player.scale.set(1, 1, 1); 
                    }
                }

                // Move ground dashes towards the player to simulate motion
                groundPlanes.forEach(dash => {
                    dash.position.z -= worldSpeed;
                    if (dash.position.z < -10) {
                        dash.position.z = 100; 
                    }
                });

                // Move side environment details
                for (let i = environmentDecoration.length - 1; i >= 0; i--) {
                    const lolly = environmentDecoration[i];
                    lolly.position.z -= worldSpeed;
                    if (lolly.position.z < -10) {
                        lolly.position.z = 70 + Math.random() * 30;
                        lolly.position.x = lolly.position.x > 0 ? (5 + Math.random() * 4) : (-5 - Math.random() * 4);
                    }
                }

                // Scroll obstacles
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    const obstacle = obstacles[i];
                    obstacle.position.z -= worldSpeed;
                    
                    if (obstacle.position.z < -15) {
                        scene.remove(obstacle);
                        obstacles.splice(i, 1);
                    }
                }

                // Scroll candies
                for (let i = candies.length - 1; i >= 0; i--) {
                    const candy = candies[i];
                    candy.position.z -= worldSpeed;
                    candy.rotation.y += 0.04;

                    if (candy.position.z < -15) {
                        scene.remove(candy);
                        candies.splice(i, 1);
                    }
                }

                // Timer based procedural spawning
                spawnObstacleTimer += 1;
                if (spawnObstacleTimer > (140 - Math.floor(worldSpeed * 70))) {
                    spawnObstacle();
                    spawnObstacleTimer = 0;
                }

                spawnCandyTimer += 1;
                if (spawnCandyTimer > (200 - Math.floor(worldSpeed * 80))) {
                    spawnCandiesChain();
                    spawnCandyTimer = 0;
                }

                checkCollisions();
            }

            renderer.render(scene, camera);
        }

        // TOUCH GESTURE SWIPING INTERFACE
        let startX = 0;
        let startY = 0;

        window.addEventListener('touchstart', (e) => {
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (!gameActive) return;

            const diffX = e.changedTouches[0].clientX - startX;
            const diffY = e.changedTouches[0].clientY - startY;

            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > 40) {
                    if (diffX > 0) moveLane(1);  
                    else moveLane(-1);          
                }
            } else {
                if (Math.abs(diffY) > 40) {
                    if (diffY < 0) triggerJump(); 
                    else triggerSlide();          
                }
            }
        }, { passive: true });

        // KEYBOARD EVENT BINDINGS
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') {
                moveLane(-1); 
            } else if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') {
                moveLane(1);  
            } else if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w' || e.key === ' ') {
                e.preventDefault();
                triggerJump();
            } else if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') {
                e.preventDefault();
                triggerSlide();
            }
        });

        // HTML BUTTONS TRIGGERS
        document.getElementById('btn-start-game').onclick = () => {
            GameAudio.init();
            document.getElementById('menu-screen').classList.add('hidden');
            document.getElementById('gameplay-hud').classList.remove('hidden');
            resetGameSpree();
            gameActive = true;
        };

        document.getElementById('btn-restart').onclick = () => {
            document.getElementById('gameover-screen').classList.add('hidden');
            resetGameSpree();
            gameActive = true;
        };

        document.getElementById('btn-back-menu').onclick = () => {
            document.getElementById('gameover-screen').classList.add('hidden');
            document.getElementById('gameplay-hud').classList.add('hidden');
            document.getElementById('menu-screen').classList.remove('hidden');
            resetGameSpree();
        };

        // Mobile On-Screen Nav Action Button Bindings
        document.getElementById('touch-left').onclick = () => moveLane(-1);
        document.getElementById('touch-right').onclick = () => moveLane(1);
        document.getElementById('touch-jump').onclick = () => triggerJump();
        document.getElementById('touch-slide').onclick = () => triggerSlide();

        // Screen Resizing Logic
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });

        // Initialize App & Read Saved scores
        window.onload = function() {
            const highscore = localStorage.getItem('omnom_run_highscore') || 0;
            document.getElementById('global-highscore').textContent = Number(highscore).toLocaleString();
            
            init3D();
            animate(0);
        };
    </script>
</body>
</html>
