    <!-- Sound Effects Module (Synthesised using Web Audio API) -->
    <script>
        const AudioFX = {
            ctx: null,
            init() {
                if (!this.ctx) {
                    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                }
            },
            playExplosion() {
                this.init();
                if (!this.ctx) return;
                
                try {
                    const bufferSize = this.ctx.sampleRate * 1.5;
                    const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = Math.random() * 2 - 1;
                    }

                    const noise = this.ctx.createBufferSource();
                    noise.buffer = buffer;

                    const filter = this.ctx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.setValueAtTime(600, this.ctx.currentTime);
                    filter.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + 1.2);

                    const gain = this.ctx.createGain();
                    gain.gain.setValueAtTime(1.5, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 1.4);

                    noise.connect(filter);
                    filter.connect(gain);
                    gain.connect(this.ctx.destination);

                    noise.start();
                } catch(e) {}
            },
            playImpact() {
                this.init();
                if (!this.ctx) return;

                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();

                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(180, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.35);

                    gain.gain.setValueAtTime(0.8, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.45);

                    osc.connect(gain);
                    gain.connect(this.ctx.destination);

                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.5);
                } catch(e) {}
            },
            playFall() {
                this.init();
                if (!this.ctx) return;

                try {
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();

                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, this.ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 0.5);

                    gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);

                    osc.connect(gain);
                    gain.connect(this.ctx.destination);

                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.5);
                } catch(e) {}
            }
        };
    </script>

    <!-- Complete Level Data Setup and Full Game Logic -->
    <script>
        // --- LEVEL ARCHITECTURES ---
        const LEVELS = [
            {
                id: 1,
                name: "Pyramid Drop",
                ammo: 3,
                winThreshold: 90, // % of blocks that must fall off platform
                colors: { platform: 0x3b82f6, target: 0xf59e0b },
                build: (addBlock) => {
                    // Pyramidal structure
                    // Row 0 (bottom)
                    addBlock(-1.5, 0.5, 0, 1, 1, 1);
                    addBlock(-0.5, 0.5, 0, 1, 1, 1);
                    addBlock(0.5, 0.5, 0, 1, 1, 1);
                    addBlock(1.5, 0.5, 0, 1, 1, 1);
                    // Row 1
                    addBlock(-1.0, 1.5, 0, 1, 1, 1);
                    addBlock(0.0, 1.5, 0, 1, 1, 1);
                    addBlock(1.0, 1.5, 0, 1, 1, 1);
                    // Row 2
                    addBlock(-0.5, 2.5, 0, 1, 1, 1);
                    addBlock(0.5, 2.5, 0, 1, 1, 1);
                    // Row 3 (top)
                    addBlock(0.0, 3.5, 0, 1, 1, 1);
                }
            },
            {
                id: 2,
                name: "The High Pillar",
                ammo: 3,
                winThreshold: 85,
                colors: { platform: 0x8b5cf6, target: 0x10b981 },
                build: (addBlock) => {
                    // Alternating blocks stacked super high
                    for (let i = 0; i < 7; i++) {
                        let widthX = (i % 2 === 0) ? 2.5 : 0.8;
                        let widthZ = (i % 2 === 0) ? 0.8 : 2.5;
                        addBlock(0, 0.4 + i * 0.8, 0, widthX, 0.8, widthZ);
                    }
                    // Add a tiny explosive/heavy dynamic sphere on top
                    addBlock(0, 5.8, 0, 1.2, 1.2, 1.2, 'sphere');
                }
            },
            {
                id: 3,
                name: "Castle Gates",
                ammo: 4,
                winThreshold: 85,
                colors: { platform: 0xec4899, target: 0x3b82f6 },
                build: (addBlock) => {
                    // Two major columns with beams and a topper
                    // Left Column
                    addBlock(-1.6, 1.0, 0, 0.8, 2.0, 0.8);
                    // Right Column
                    addBlock(1.6, 1.0, 0, 0.8, 2.0, 0.8);
                    
                    // Main Crossbar Arch
                    addBlock(0, 2.3, 0, 4.4, 0.6, 1.0);
                    
                    // Top structure on the arch
                    addBlock(-1.0, 3.0, 0, 0.8, 0.8, 0.8);
                    addBlock(1.0, 3.0, 0, 0.8, 0.8, 0.8);
                    addBlock(0, 3.5, 0, 1.2, 1.2, 1.2, 'sphere');
                }
            },
            {
                id: 4,
                name: "Jenga Tower",
                ammo: 4,
                winThreshold: 90,
                colors: { platform: 0x14b8a6, target: 0xf43f5e },
                build: (addBlock) => {
                    // Complex stacked tower
                    const numLayers = 8;
                    for (let layer = 0; layer < numLayers; layer++) {
                        let y = 0.3 + layer * 0.6;
                        if (layer % 2 === 0) {
                            addBlock(-0.8, y, 0, 0.6, 0.6, 2.4);
                            addBlock(0, y, 0, 0.6, 0.6, 2.4);
                            addBlock(0.8, y, 0, 0.6, 0.6, 2.4);
                        } else {
                            addBlock(0, y, -0.8, 2.4, 0.6, 0.6);
                            addBlock(0, y, 0, 2.4, 0.6, 0.6);
                            addBlock(0, y, 0.8, 2.4, 0.6, 0.6);
                        }
                    }
                }
            },
            {
                id: 5,
                name: "Fortress Wall",
                ammo: 5,
                winThreshold: 80,
                colors: { platform: 0xf59e0b, target: 0x8b5cf6 },
                build: (addBlock) => {
                    // Thick defensive wall setup
                    for (let row = 0; row < 5; row++) {
                        const y = 0.4 + row * 0.8;
                        const blockCount = 5 - (row % 2); // alternating bricks
                        const spacing = 1.0;
                        const offset = (row % 2 === 0) ? 0 : 0.5;
                        
                        for (let col = 0; col < blockCount; col++) {
                            const x = (col - (blockCount - 1) / 2) * spacing;
                            // Outer bricks
                            addBlock(x, y, -0.4, 0.8, 0.8, 0.8);
                            // Inner support bricks
                            addBlock(x, y, 0.4, 0.8, 0.8, 0.8);
                        }
                    }
                }
            }
        ];

        // --- GAME STATE ---
        let currentLevelIndex = 0;
        let activeAmmo = 0;
        let blocks = []; // List of all targets { mesh, body, initialY, isOffPlatform }
        let cannonballs = []; // List of cannonballs in scene { mesh, body }
        let particles = []; // Particle systems tracking custom debris/smoke
        let gameOver = false;
        let aiming = false;
        let levelPercentage = 0;

        // Custom aiming target coordinates
        let targetPos = new THREE.Vector3(0, 1.8, 0); // Where the player is pointing
        const targetLimits = { xMin: -4, xMax: 4, yMin: 0.1, yMax: 5.5 };

        // Sound simulation / Visual Screenshake variables
        let screenShakeTime = 0;
        let screenShakeIntensity = 0;

        // Touch/Pointer dragging state
        let pointerStart = { x: 0, y: 0 };
        let pointerCurrent = { x: 0, y: 0 };

        // --- THREE.JS & CANNON.JS INITIALIZATION ---
        let scene, camera, renderer, world;
        let platformMesh, platformBody;
        let cannonBase, cannonBarrel;
        let trajectoryPoints = [];
        let aimReticle; // 3D target visualizer on screen

        // Materials
        let blockMaterial, sphereMaterial, platformMaterialInstance;

        function initEngine() {
            // Setup Loading Progress
            updateLoading(30);

            // ThreeJS Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0e0c1a);
            scene.fog = new THREE.FogExp2(0x0e0c1a, 0.015);

            // Camera looking directly at the tower platform (z = 0)
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 4.2, 13.5);
            camera.lookAt(0, 1.6, 0);

            // Renderer with shadows
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // Clean dynamic canvas containers
            const container = document.getElementById('canvasContainer');
            container.innerHTML = '';
            container.appendChild(renderer.domElement);

            // Cannon Physics World
            world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);
            world.broadphase = new CANNON.NaiveBroadphase();
            world.solver.iterations = 12;

            // Physics materials setup
            const groundPhysMat = new CANNON.Material("groundMaterial");
            const blockPhysMat = new CANNON.Material("blockMaterial");
            const ballPhysMat = new CANNON.Material("ballMaterial");

            // Setup interactions
            const blockGroundContact = new CANNON.ContactMaterial(groundPhysMat, blockPhysMat, {
                friction: 0.5,
                restitution: 0.1
            });
            const ballBlockContact = new CANNON.ContactMaterial(ballPhysMat, blockPhysMat, {
                friction: 0.3,
                restitution: 0.35
            });
            world.addContactMaterial(blockGroundContact);
            world.addContactMaterial(ballBlockContact);

            // Lighting (Optimized Brightness)
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.65);
            scene.add(ambientLight);

            // Directional Light with beautiful soft shadows
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.95);
            dirLight.position.set(8, 16, 8);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 30;
            const d = 8;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.bias = -0.001;
            scene.add(dirLight);

            // Subdued backlight for depth
            const backLight = new THREE.DirectionalLight(0x6366f1, 0.55);
            backLight.position.set(-8, 4, -8);
            scene.add(backLight);

            // Build Static Platform Setup
            createWorldPlatform(groundPhysMat);

            // Build Beautiful Articulated Cannon model at the front (z = 7)
            createCannonModel();

            // Setup a 3D aiming Reticle Crosshair
            createAimReticle();

            // Set up projectile trajectory prediction visualizer
            createTrajectoryVisualizer();

            // Setup Responsive Resize
            window.addEventListener('resize', onWindowResize);

            // Event Listeners for Game Play Interaction
            setupInteractionListeners();

            updateLoading(70);

            // Load Level 1 initially
            loadLevel(0);

            // Hide Loading Screen
            setTimeout(() => {
                const loadingScreen = document.getElementById('loadingScreen');
                if (loadingScreen) loadingScreen.classList.add('hidden');
            }, 500);

            // Kick off game loop
            animate();
        }

        function updateLoading(progress) {
            const progressBar = document.getElementById('loadingProgress');
            if (progressBar) progressBar.style.width = progress + '%';
        }

        // --- CREATE PHYSICS PLATFORM & ENVIRONMENT ---
        function createWorldPlatform(physMat) {
            const pWidth = 7.5;
            const pHeight = 1.0;
            const pDepth = 7.5;
            
            const geom = new THREE.BoxGeometry(pWidth, pHeight, pDepth);
            // Unique platform material instance
            platformMaterialInstance = new THREE.MeshStandardMaterial({
                color: 0x3b82f6,
                roughness: 0.5,
                metalness: 0.2
            });
            platformMesh = new THREE.Mesh(geom, platformMaterialInstance);
            platformMesh.position.set(0, -pHeight/2, 0); // Top sits at Y = 0
            platformMesh.receiveShadow = true;
            platformMesh.castShadow = true;
            scene.add(platformMesh);

            // Platform Static Physics Body
            const halfExtents = new CANNON.Vec3(pWidth/2, pHeight/2, pDepth/2);
            const boxShape = new CANNON.Box(halfExtents);
            platformBody = new CANNON.Body({
                mass: 0, // static
                shape: boxShape,
                material: physMat
            });
            platformBody.position.set(0, -pHeight/2, 0);
            world.addBody(platformBody);

            // Floor mesh underneath
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x0a0914,
                roughness: 0.9,
                metalness: 0.1
            });
            const floorMesh = new THREE.Mesh(floorGeo, floorMat);
            floorMesh.rotation.x = -Math.PI / 2;
            floorMesh.position.y = -6;
            floorMesh.receiveShadow = true;
            scene.add(floorMesh);
        }

        // --- ARTICULATED 3D CANNON MODEL ---
        function createCannonModel() {
            // Positioned at the bottom foreground facing NEGATIVE Z
            const cannonZ = 6.8;
            const cannonY = 0.4;

            cannonBase = new THREE.Group();
            cannonBase.position.set(0, cannonY, cannonZ);
            scene.add(cannonBase);

            // Create simple stylish wheels and axle
            const wheelGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.18, 16);
            const darkMetalMat = new THREE.MeshStandardMaterial({ color: 0x1e293b, roughness: 0.7, metalness: 0.7 });
            
            const leftWheel = new THREE.Mesh(wheelGeo, darkMetalMat);
            leftWheel.rotation.z = Math.PI/2;
            leftWheel.position.set(-0.6, 0, 0);
            leftWheel.castShadow = true;
            cannonBase.add(leftWheel);

            const rightWheel = leftWheel.clone();
            rightWheel.position.set(0.6, 0, 0);
            cannonBase.add(rightWheel);

            const axleGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.1, 8);
            const axle = new THREE.Mesh(axleGeo, darkMetalMat);
            axle.rotation.z = Math.PI/2;
            cannonBase.add(axle);

            // Barrel pivot point container
            cannonBarrel = new THREE.Group();
            cannonBarrel.position.set(0, 0.15, 0);
            cannonBase.add(cannonBarrel);

            // Main gold cylinder tube
            const barrelLength = 1.5;
            const barrelGeo = new THREE.CylinderGeometry(0.24, 0.35, barrelLength, 16);
            // Translate cylinder upwards so pivot is at the base
            barrelGeo.translate(0, barrelLength/2, -0.1);
            // Rotate visually so "up" of cylinder aligns along NEGATIVE Z (the firing direction)
            barrelGeo.rotateX(-Math.PI / 2);

            const goldMetalMat = new THREE.MeshStandardMaterial({ color: 0xeab308, roughness: 0.15, metalness: 0.85 });
            const barrelMesh = new THREE.Mesh(barrelGeo, goldMetalMat);
            barrelMesh.castShadow = true;
            cannonBarrel.add(barrelMesh);

            // Muzzle indicator ring
            const ringGeo = new THREE.TorusGeometry(0.26, 0.06, 8, 20);
            const ringMesh = new THREE.Mesh(ringGeo, goldMetalMat);
            ringMesh.position.set(0, 0, -barrelLength + 0.1);
            cannonBarrel.add(ringMesh);
        }

        // --- 3D AIMING RETICLE ---
        function createAimReticle() {
            const geom = new THREE.RingGeometry(0.22, 0.28, 16);
            const mat = new THREE.MeshBasicMaterial({ color: 0xfacc15, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
            aimReticle = new THREE.Mesh(geom, mat);
            aimReticle.position.copy(targetPos);
            scene.add(aimReticle);

            // Inner center dot
            const centerGeom = new THREE.SphereGeometry(0.06, 8, 8);
            const centerMat = new THREE.MeshBasicMaterial({ color: 0xfbbf24 });
            const centerDot = new THREE.Mesh(centerGeom, centerMat);
            aimReticle.add(centerDot);
        }

        // --- PREDICTOR TRAJECTORY VISUALIZER ---
        function createTrajectoryVisualizer() {
            const pointCount = 18;
            const pointGeo = new THREE.SphereGeometry(0.045, 8, 8);
            const pointMat = new THREE.MeshBasicMaterial({ color: 0xfacc15, transparent: true, opacity: 0 });
            
            for (let i = 0; i < pointCount; i++) {
                const pt = new THREE.Mesh(pointGeo, pointMat);
                scene.add(pt);
                trajectoryPoints.push(pt);
            }
        }

        function updateTrajectory() {
            if (!aiming || gameOver) {
                // Hide dots
                trajectoryPoints.forEach(p => p.material.opacity = 0);
                aimReticle.material.opacity = 0;
                aimReticle.children[0].material.opacity = 0;
                return;
            }

            // Make target reticle visible
            aimReticle.material.opacity = 0.8;
            aimReticle.children[0].material.opacity = 1;

            // Find cannon's muzzle origin position in world space
            const muzzleOffset = new THREE.Vector3(0, 0.15, -1.4);
            muzzleOffset.applyQuaternion(cannonBarrel.quaternion);
            const startPos = new THREE.Vector3().copy(cannonBase.position).add(muzzleOffset);

            // Vector pointing towards 3D crosshair reticle
            const dir = new THREE.Vector3().subVectors(targetPos, startPos).normalize();
            const fireVelocity = 18.5; // Firing impulse speed
            const velocity = dir.multiplyScalar(fireVelocity);

            const gravity = -9.82;
            const step = 0.05; // Time delta step

            for (let i = 0; i < trajectoryPoints.length; i++) {
                const t = i * step;
                // Basic physics trajectory calculation: s = s0 + vt + 0.5 * at^2
                const x = startPos.x + velocity.x * t;
                const y = startPos.y + velocity.y * t + 0.5 * gravity * t * t;
                const z = startPos.z + velocity.z * t;

                trajectoryPoints[i].position.set(x, y, z);
                
                // Fade out dots the further along the path they are
                const opacity = Math.max(0, 1 - (i / trajectoryPoints.length));
                trajectoryPoints[i].material.opacity = opacity * 0.95;
            }
        }

        // --- LEVEL GENERATION SYSTEM ---
        function loadLevel(index) {
            currentLevelIndex = index;
            const lvl = LEVELS[currentLevelIndex];

            gameOver = false;
            activeAmmo = lvl.ammo;
            levelPercentage = 0;

            // Reset aiming coordinate
            targetPos.set(0, 1.8, 0);
            aimReticle.position.copy(targetPos);

            // Update UI
            document.getElementById('levelLabel').innerText = `LEVEL ${lvl.id}`;
            document.getElementById('levelName').innerText = lvl.name;
            updateProgressBar(0);
            renderAmmoCounter();

            // Update dynamic platform visual color
            platformMaterialInstance.color.setHex(lvl.colors.platform);

            // Clean up existing targets and cannonballs
            clearInteractiveEntities();

            // Materials configuration matching color palette
            blockMaterial = new THREE.MeshStandardMaterial({
                color: lvl.colors.target,
                roughness: 0.45,
                metalness: 0.15,
                flatShading: true
            });
            sphereMaterial = new THREE.MeshStandardMaterial({
                color: 0xf43f5e, // Bright highlight red/pink
                roughness: 0.3,
                metalness: 0.5
            });

            // Reconstruct level block shapes
            lvl.build(addBlockToScene);

            // Hide overlay modals
            document.getElementById('winModal').classList.add('hidden');
            document.getElementById('loseModal').classList.add('hidden');
            document.getElementById('levelDrawer').classList.add('hidden');
        }

        function clearInteractiveEntities() {
            // Remove blocks
            blocks.forEach(b => {
                scene.remove(b.mesh);
                world.remove(b.body);
            });
            blocks = [];

            // Remove cannonballs
            cannonballs.forEach(c => {
                scene.remove(c.mesh);
                world.remove(c.body);
            });
            cannonballs = [];

            // Clean particles
            particles.forEach(p => scene.remove(p.system));
            particles = [];
        }

        function addBlockToScene(x, y, z, sx, sy, sz, shapeType = 'box') {
            let mesh, body;
            const mass = 1.0;

            if (shapeType === 'box') {
                const geom = new THREE.BoxGeometry(sx, sy, sz);
                mesh = new THREE.Mesh(geom, blockMaterial);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.position.set(x, y, z);
                scene.add(mesh);

                // Cannon physics box matching visual half-extents
                const boxShape = new CANNON.Box(new CANNON.Vec3(sx/2, sy/2, sz/2));
                body = new CANNON.Body({
                    mass: mass,
                    shape: boxShape
                });
                body.position.set(x, y, z);
                
                // CRASH-PROOF COLLISION LISTENER:
                body.addEventListener("collide", (e) => {
                    try {
                        const speed = body.velocity.norm ? body.velocity.norm() : 1.0;
                        if (speed > 1.2) {
                            AudioFX.playImpact();
                        }
                    } catch(err) {}
                });

                world.addBody(body);
            } else if (shapeType === 'sphere') {
                const radius = sx / 2;
                const geom = new THREE.SphereGeometry(radius, 16, 16);
                mesh = new THREE.Mesh(geom, sphereMaterial);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.position.set(x, y, z);
                scene.add(mesh);

                const sphereShape = new CANNON.Sphere(radius);
                body = new CANNON.Body({
                    mass: mass * 1.6,
                    shape: sphereShape
                });
                body.position.set(x, y, z);

                // CRASH-PROOF COLLISION LISTENER:
                body.addEventListener("collide", (e) => {
                    try {
                        const speed = body.velocity.norm ? body.velocity.norm() : 1.0;
                        if (speed > 1.2) {
                            AudioFX.playImpact();
                        }
                    } catch(err) {}
                });

                world.addBody(body);
            }

            blocks.push({
                mesh: mesh,
                body: body,
                initialY: y,
                fallen: false,
                type: shapeType
            });
        }

        // --- UNIFIED POINTER DRAG AIMING (Saves from touch double-fire bugs) ---
        function setupInteractionListeners() {
            const container = document.getElementById('canvasContainer');

            // Listen to unified Pointer Down (triggers on both Touch & Mouse smoothly)
            container.addEventListener('pointerdown', (e) => {
                if (gameOver) return;
                
                // Avoid firing on mouse right/middle clicks
                if (e.pointerType === 'mouse' && e.button !== 0) return;

                aiming = true;
                pointerStart = { x: e.clientX, y: e.clientY };
                
                // Cap pointer boundary to keep tracking smoothly off-canvas
                try {
                    container.setPointerCapture(e.pointerId);
                } catch(err) {}
            });

            container.addEventListener('pointermove', (e) => {
                if (!aiming) return;
                
                const deltaX = e.clientX - pointerStart.x;
                const deltaY = e.clientY - pointerStart.y;

                pointerStart = { x: e.clientX, y: e.clientY };

                // Fine-tuned drag sensitivities matching touch vs. desktop mouse DPI
                const sensitivity = e.pointerType === 'touch' ? 0.016 : 0.014;

                targetPos.x += deltaX * sensitivity;
                targetPos.y -= deltaY * sensitivity; // Inverted Y coordinates for natural feeling dragging

                // Limit boundaries for aim reticle
                targetPos.x = Math.max(targetLimits.xMin, Math.min(targetLimits.xMax, targetPos.x));
                targetPos.y = Math.max(targetLimits.yMin, Math.min(targetLimits.yMax, targetPos.y));

                aimReticle.position.copy(targetPos);
            });

            container.addEventListener('pointerup', (e) => {
                if (aiming) {
                    aiming = false;
                    try {
                        container.releasePointerCapture(e.pointerId);
                    } catch(err) {}
                    
                    fireCannonball();
                }
            });

            container.addEventListener('pointercancel', (e) => {
                if (aiming) {
                    aiming = false;
                    try {
                        container.releasePointerCapture(e.pointerId);
                    } catch(err) {}
                }
            });

            // Button controls Setup
            document.getElementById('restartBtn').addEventListener('click', () => loadLevel(currentLevelIndex));
            document.getElementById('retryBtn').addEventListener('click', () => loadLevel(currentLevelIndex));
            document.getElementById('replayWinBtn').addEventListener('click', () => loadLevel(currentLevelIndex));

            document.getElementById('nextLevelBtn').addEventListener('click', () => {
                const nextIndex = (currentLevelIndex + 1) % LEVELS.length;
                loadLevel(nextIndex);
            });

            // Level Selector Drawer Setup
            const selectToggle = document.getElementById('levelSelectToggle');
            const selectDrawer = document.getElementById('levelDrawer');
            const closeLevels = document.getElementById('closeLevelsBtn');
            const loseLevelBtn = document.getElementById('loseLevelSelectBtn');

            const openLevelPanel = () => {
                const grid = document.getElementById('levelGrid');
                grid.innerHTML = '';
                LEVELS.forEach((lvl, index) => {
                    const btn = document.createElement('button');
                    btn.className = `p-4 rounded-2xl font-bold flex flex-col items-center gap-1 transition-all ${
                        index === currentLevelIndex 
                        ? 'bg-yellow-400 text-indigo-950 border-2 border-yellow-300 shadow-md' 
                        : 'bg-indigo-900 bg-opacity-50 text-indigo-100 hover:bg-opacity-80'
                    }`;
                    btn.innerHTML = `
                        <span class="text-xs uppercase opacity-75">Mission ${lvl.id}</span>
                        <span class="text-sm font-semibold truncate max-w-full">${lvl.name}</span>
                    `;
                    btn.addEventListener('click', () => {
                        loadLevel(index);
                        selectDrawer.classList.add('hidden');
                    });
                    grid.appendChild(btn);
                });
                selectDrawer.classList.remove('hidden');
            };

            selectToggle.addEventListener('click', openLevelPanel);
            loseLevelBtn.addEventListener('click', openLevelPanel);
            closeLevels.addEventListener('click', () => selectDrawer.classList.add('hidden'));
        }

        // --- PROJECTILE SHOOTING MECHANICS ---
        function fireCannonball() {
            if (activeAmmo <= 0 || gameOver) return;

            activeAmmo--;
            renderAmmoCounter();

            // Trigger synthesised explosion audio FX
            AudioFX.playExplosion();

            // Muzzle global coordinates
            const muzzleOffset = new THREE.Vector3(0, 0.15, -1.4);
            muzzleOffset.applyQuaternion(cannonBarrel.quaternion);
            const spawnPos = new THREE.Vector3().copy(cannonBase.position).add(muzzleOffset);

            // Corrected trajectory calculation towards the targetPos coordinates
            const fireVelocity = 18.5;
            const lookDir = new THREE.Vector3().subVectors(targetPos, spawnPos).normalize();

            // ThreeJS Visual Ball Mesh
            const ballRadius = 0.36;
            const ballGeo = new THREE.SphereGeometry(ballRadius, 18, 18);
            const ballMat = new THREE.MeshStandardMaterial({
                color: 0x334155, // Charcoal metallic steel
                roughness: 0.15,
                metalness: 0.95
            });
            const mesh = new THREE.Mesh(ballGeo, ballMat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            mesh.position.copy(spawnPos);
            scene.add(mesh);

            // Cannon Physics Body
            const ballShape = new CANNON.Sphere(ballRadius);
            const body = new CANNON.Body({
                mass: 4.8, // Heavy kinetic mass to guarantee collapse of tall blocks
                shape: ballShape
            });
            body.position.set(spawnPos.x, spawnPos.y, spawnPos.z);
            
            // Set dynamic velocity vectors
            const impulse = new CANNON.Vec3(lookDir.x * fireVelocity, lookDir.y * fireVelocity, lookDir.z * fireVelocity);
            body.velocity.copy(impulse);
            world.addBody(body);

            // Register cannonball to list
            cannonballs.push({ mesh, body });

            // Visual Muzzle blast and screen-shake effect
            spawnMuzzleBlastParticles(spawnPos, lookDir);
            triggerScreenShake(0.4);

            // Start final assessment checks if player has fired all ammo
            if (activeAmmo === 0) {
                setTimeout(checkLevelFinalState, 4500); // 4.5 second window to wait for block falls
            }
        }

        // --- DYNAMIC PARTICLE EFFECTS ---
        function spawnMuzzleBlastParticles(muzzlePos, direction) {
            const count = 30;
            const geom = new THREE.BufferGeometry();
            const positions = [];
            const velocities = [];

            for (let i = 0; i < count; i++) {
                positions.push(muzzlePos.x, muzzlePos.y, muzzlePos.z);
                
                const speed = 2 + Math.random() * 6;
                const spread = 0.4;
                velocities.push(
                    (direction.x + (Math.random() - 0.5) * spread) * speed,
                    (direction.y + (Math.random() - 0.5) * spread) * speed,
                    (direction.z + (Math.random() - 0.5) * spread) * speed
                );
            }

            geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const particleMat = new THREE.PointsMaterial({
                color: 0xf59e0b, // Vibrant orange/yellow flame
                size: 0.22,
                transparent: true,
                opacity: 0.95,
                blending: THREE.AdditiveBlending
            });

            const pointSystem = new THREE.Points(geom, particleMat);
            scene.add(pointSystem);

            particles.push({
                system: pointSystem,
                velocities: velocities,
                lifespan: 0.9,
                maxLifespan: 0.9
            });
        }

        function spawnImpactDebrisParticles(impactPos, isSpecial = false) {
            const count = 15;
            const geom = new THREE.BufferGeometry();
            const positions = [];
            const velocities = [];

            for (let i = 0; i < count; i++) {
                positions.push(impactPos.x, impactPos.y, impactPos.z);
                
                const speed = 1.5 + Math.random() * 4;
                velocities.push(
                    (Math.random() - 0.5) * speed,
                    (Math.random() + 0.3) * speed, // Burst upward
                    (Math.random() - 0.5) * speed
                );
            }

            geom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            
            const color = isSpecial ? 0xf43f5e : LEVELS[currentLevelIndex].colors.target;
            const particleMat = new THREE.PointsMaterial({
                color: color,
                size: 0.16,
                transparent: true,
                opacity: 0.85
            });

            const pointSystem = new THREE.Points(geom, particleMat);
            scene.add(pointSystem);

            particles.push({
                system: pointSystem,
                velocities: velocities,
                lifespan: 0.75,
                maxLifespan: 0.75
            });
        }

        // --- UPDATE SYSTEM ANIMATIONS ---
        function updateParticles(dt) {
            for (let idx = particles.length - 1; idx >= 0; idx--) {
                const p = particles[idx];
                p.lifespan -= dt;

                if (p.lifespan <= 0) {
                    scene.remove(p.system);
                    particles.splice(idx, 1);
                    continue;
                }

                const posAttr = p.system.geometry.attributes.position;
                const arr = posAttr.array;
                
                for (let i = 0; i < arr.length; i += 3) {
                    arr[i] += p.velocities[i] * dt;
                    arr[i+1] += p.velocities[i+1] * dt;
                    arr[i+2] += p.velocities[i+2] * dt;

                    // Apply slight downward gravity
                    p.velocities[i+1] -= 9.8 * dt; 
                }
                posAttr.needsUpdate = true;
                p.system.material.opacity = Math.max(0, p.lifespan / p.maxLifespan);
            }
        }

        // --- JUICY GRAPHICS (SCREENSHAKE) ---
        function triggerScreenShake(intensity) {
            screenShakeIntensity = intensity;
            screenShakeTime = 0.22;
        }

        function updateScreenShake(dt) {
            if (screenShakeTime > 0) {
                screenShakeTime -= dt;
                
                const shakeX = (Math.random() - 0.5) * screenShakeIntensity;
                const shakeY = (Math.random() - 0.5) * screenShakeIntensity;
                
                camera.position.x += shakeX;
                camera.position.y += shakeY;

                screenShakeIntensity *= 0.88;
            } else {
                camera.position.x = THREE.MathUtils.lerp(camera.position.x, 0, 0.1);
            }
        }

        // --- HUD UPDATES ---
        function renderAmmoCounter() {
            const container = document.getElementById('ammoContainer');
            if (!container) return;
            container.innerHTML = '';
            
            for (let i = 0; i < activeAmmo; i++) {
                const ballIcon = document.createElement('div');
                ballIcon.className = 'w-5 h-5 bg-yellow-400 rounded-full shadow border border-yellow-200 transform scale-100 transition-all duration-300';
                container.appendChild(ballIcon);
            }
            if (activeAmmo === 0) {
                container.innerHTML = '<span class="text-rose-400 font-bold text-sm tracking-wider uppercase animate-pulse">Empty!</span>';
            }
        }

        function updateProgressBar(percent) {
            const bar = document.getElementById('progressBar');
            const text = document.getElementById('progressPercent');
            if (!bar || !text) return;
            
            bar.style.width = `${percent}%`;
            text.innerText = `${percent}%`;

            if (percent >= 100) {
                text.className = "title-font text-yellow-300 text-sm md:text-base min-w-[40px] text-right pulse-active";
            } else {
                text.className = "title-font text-emerald-400 text-sm md:text-base min-w-[40px] text-right";
            }
        }

        // --- WIN / LOSS GAME LOGICS ---
        function checkLevelProgress() {
            if (blocks.length === 0) return;

            let fallenCount = 0;
            const fallLimitY = -1.2; // Point below top platform surface

            blocks.forEach(b => {
                // If block fell far below the top surface of the platform
                if (b.body.position.y < fallLimitY && !b.fallen) {
                    b.fallen = true;
                    // Trigger synthesised fall sound
                    AudioFX.playFall();
                    spawnImpactDebrisParticles(b.mesh.position, b.type === 'sphere');
                    triggerScreenShake(0.15);
                }
                if (b.fallen) {
                    fallenCount++;
                }
            });

            levelPercentage = Math.round((fallenCount / blocks.length) * 100);
            updateProgressBar(levelPercentage);

            // Victory check
            const activeLevel = LEVELS[currentLevelIndex];
            if (levelPercentage >= activeLevel.winThreshold && !gameOver) {
                triggerVictory();
            }
        }

        function checkLevelFinalState() {
            if (gameOver) return;

            const activeLevel = LEVELS[currentLevelIndex];
            if (levelPercentage >= activeLevel.winThreshold) {
                triggerVictory();
            } else {
                triggerDefeat();
            }
        }

        function triggerVictory() {
            gameOver = true;
            document.getElementById('winPercentText').innerText = `Completed with ${levelPercentage}% Castle Demolition!`;
            
            setTimeout(() => {
                document.getElementById('winModal').classList.remove('hidden');
            }, 600);
        }

        function triggerDefeat() {
            gameOver = true;
            document.getElementById('losePercentText').innerText = `Only reached ${levelPercentage}% of required ${LEVELS[currentLevelIndex].winThreshold}%`;
            
            setTimeout(() => {
                document.getElementById('loseModal').classList.remove('hidden');
            }, 600);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- MAIN ANIMATION ENGINE LOOP ---
        const clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);

            // Synchronous deterministic physics step (prevents temporal glitches)
            world.step(1 / 60);

            // Sync physics blocks with ThreeJS visualization meshes explicitly
            blocks.forEach(b => {
                b.mesh.position.set(b.body.position.x, b.body.position.y, b.body.position.z);
                b.mesh.quaternion.set(b.body.quaternion.x, b.body.quaternion.y, b.body.quaternion.z, b.body.quaternion.w);
            });

            // Sync fired cannonballs explicitly
            cannonballs.forEach(c => {
                c.mesh.position.set(c.body.position.x, c.body.position.y, c.body.position.z);
                c.mesh.quaternion.set(c.body.quaternion.x, c.body.quaternion.y, c.body.quaternion.z, c.body.quaternion.w);
            });

            // Target alignment pointing (In world space coordinates)
            if (cannonBarrel) {
                cannonBarrel.lookAt(targetPos);
            }

            // Calculate trajectory path dots
            updateTrajectory();

            // Update visual screenshakes
            const dt = clock.getDelta();
            updateScreenShake(dt);

            // Check destruction level
            checkLevelProgress();

            // Update explosion particles
            updateParticles(dt);

            // Render Frame
            renderer.render(scene, camera);
        }

        // Execute boot sequence with iframe-ready fallback triggers
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
            initEngine();
        } else {
            window.addEventListener('DOMContentLoaded', initEngine);
        }
