<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Dash Arcade</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            background-color: #0a0a0c;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
        }

        canvas {
            display: block;
            max-width: 95vw;
            max-height: 70vh;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            background-color: #121214;
            border: 2px solid #333;
        }

        .ui-panel {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 20px;
            pointer-events: none;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: bold;
            color: #00f2ff;
        }

        #overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .btn {
            background: #00f2ff;
            color: #000;
            padding: 15px 40px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            pointer-events: auto;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        #message-box {
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px #00f2ff;
        }

        .instructions {
            position: absolute;
            bottom: 30px;
            color: #555;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="ui-panel">
        <div class="stat-card">
            <div class="stat-label">Level</div>
            <div id="level-val" class="stat-value">1</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Lives</div>
            <div id="lives-val" class="stat-value">5</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Speed</div>
            <div id="speed-val" class="stat-value">2.0</div>
        </div>
    </div>

    <canvas id="mycanvas"></canvas>

    <div id="overlay">
        <h2 id="message-box">NEON DASH</h2>
        <p id="sub-message">Avoid the red nodes</p>
        <div id="action-btn" class="btn">Start Game</div>
    </div>

    <div class="instructions">
        Hold MOUSE or TOUCH to accelerate forward
    </div>
</div>

<script>
    window.addEventListener("load", function() {
        // --- Setup ---
        const canvas = document.getElementById("mycanvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const messageBox = document.getElementById("message-box");
        const subMessage = document.getElementById("sub-message");
        const actionBtn = document.getElementById("action-btn");
        
        const levelEl = document.getElementById("level-val");
        const livesEl = document.getElementById("lives-val");
        const speedEl = document.getElementById("speed-val");

        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 450;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // --- Game State ---
        let gameActive = false;
        let level = 1;
        let lives = 5;
        let playerBaseSpeed = 3;
        let particles = [];

        // --- Objects ---
        const player = {
            x: 40,
            y: GAME_HEIGHT / 2 - 20,
            w: 36,
            h: 36,
            speed: 0,
            color: '#00f2ff',
            isMoving: false,
            pulse: 0
        };

        const goal = {
            x: GAME_WIDTH - 80,
            y: GAME_HEIGHT / 2 - 40,
            w: 50,
            h: 80,
            color: '#39ff14'
        };

        let enemies = [];

        // --- Logic ---
        function initEnemies() {
            enemies = [];
            const count = 3 + Math.min(level, 4);
            const spacing = (GAME_WIDTH - 200) / count;
            
            for (let i = 0; i < count; i++) {
                const speedDir = (i % 2 === 0) ? 1 : -1;
                const speedMag = 2 + (level * 0.5) + (Math.random() * 1);
                
                enemies.push({
                    x: 150 + (i * spacing),
                    y: Math.random() * (GAME_HEIGHT - 100) + 50,
                    w: 30,
                    h: 30,
                    speedY: speedMag * speedDir,
                    color: '#ff3131',
                    offset: Math.random() * Math.PI * 2
                });
            }
        }

        function createParticles(x, y, color, count = 10) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8,
                    life: 1.0,
                    color: color,
                    size: Math.random() * 4 + 2
                });
            }
        }

        function resetPlayer() {
            player.x = 40;
            player.y = GAME_HEIGHT / 2 - 20;
            player.isMoving = false;
            player.speed = 0;
        }

        function showUI(msg, sub, btnText) {
            gameActive = false;
            messageBox.innerText = msg;
            subMessage.innerText = sub;
            actionBtn.innerText = btnText;
            overlay.style.display = 'flex';
        }

        function checkRectCollision(r1, r2) {
            return r1.x < r2.x + r2.w &&
                   r1.x + r1.w > r2.x &&
                   r1.y < r2.y + r2.h &&
                   r1.y + r1.h > r2.y;
        }

        // --- Core Loops ---
        function update() {
            if (!gameActive) return;

            // Particles
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;
                if (p.life <= 0) particles.splice(i, 1);
            });

            // Player logic
            if (player.isMoving) {
                player.speed = Math.min(player.speed + 0.2, playerBaseSpeed + (level * 0.2));
            } else {
                player.speed = Math.max(player.speed - 0.1, 0);
            }
            player.x += player.speed;
            player.pulse += 0.1;

            // Goal Collision
            if (checkRectCollision(player, goal)) {
                createParticles(player.x + player.w, player.y + player.h/2, goal.color, 30);
                level++;
                lives++;
                playerBaseSpeed += 0.2;
                updateStats();
                showUI("LEVEL CLEAR", `Level ${level} reached! +1 Life`, "Next Level");
                resetPlayer();
            }

            // Enemies logic
            enemies.forEach(enemy => {
                enemy.y += enemy.speedY;
                
                // Wall Bounce
                if (enemy.y <= 0 || enemy.y + enemy.h >= GAME_HEIGHT) {
                    enemy.speedY *= -1;
                    createParticles(enemy.x + enemy.w/2, enemy.y + (enemy.speedY > 0 ? 0 : enemy.h), enemy.color, 3);
                }

                // Player Collision
                if (checkRectCollision(player, enemy)) {
                    createParticles(player.x + player.w/2, player.y + player.h/2, '#ffffff', 20);
                    lives--;
                    updateStats();
                    
                    if (lives <= 0) {
                        showUI("GAME OVER", `Final Level: ${level}`, "Restart Journey");
                        level = 1;
                        lives = 5;
                        playerBaseSpeed = 3;
                    } else {
                        showUI("HIT!", `${lives} lives remaining`, "Continue");
                    }
                    resetPlayer();
                }
            });

            // Bounds check
            if (player.x > GAME_WIDTH) resetPlayer();
        }

        function draw() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Grid background
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            for(let x=0; x<GAME_WIDTH; x+=40) {
                ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x, GAME_HEIGHT); ctx.stroke();
            }
            for(let y=0; y<GAME_HEIGHT; y+=40) {
                ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(GAME_WIDTH, y); ctx.stroke();
            }

            // Draw Goal
            ctx.shadowBlur = 15;
            ctx.shadowColor = goal.color;
            ctx.fillStyle = goal.color;
            ctx.fillRect(goal.x, goal.y, goal.w, goal.h);
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.strokeRect(goal.x + 5, goal.y + 5, goal.w - 10, goal.h - 10);

            // Draw Particles
            ctx.shadowBlur = 0;
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, p.size, p.size);
            });
            ctx.globalAlpha = 1;

            // Draw Enemies
            enemies.forEach(enemy => {
                ctx.shadowBlur = 10;
                ctx.shadowColor = enemy.color;
                ctx.fillStyle = enemy.color;
                
                // Pulsing shape
                const s = Math.sin(Date.now() / 200 + enemy.offset) * 3;
                ctx.fillRect(enemy.x - s/2, enemy.y - s/2, enemy.w + s, enemy.h + s);
                
                // Eye
                ctx.fillStyle = 'white';
                ctx.fillRect(enemy.x + 10, enemy.y + 10, 5, 5);
            });

            // Draw Player
            ctx.shadowBlur = 15 + Math.sin(player.pulse) * 5;
            ctx.shadowColor = player.color;
            ctx.fillStyle = player.color;
            
            // Trail effect
            if (player.speed > 0) {
                ctx.globalAlpha = 0.3;
                ctx.fillRect(player.x - 10, player.y + 2, player.w, player.h - 4);
                ctx.fillRect(player.x - 20, player.y + 5, player.w, player.h - 10);
                ctx.globalAlpha = 1;
            }

            ctx.beginPath();
            ctx.roundRect(player.x, player.y, player.w, player.h, 8);
            ctx.fill();
            
            // Player details
            ctx.strokeStyle = 'rgba(255,255,255,0.8)';
            ctx.lineWidth = 2;
            ctx.strokeRect(player.x + 8, player.y + 8, player.w - 16, player.h - 16);

            requestAnimationFrame(() => {
                update();
                draw();
            });
        }

        function updateStats() {
            levelEl.innerText = level;
            livesEl.innerText = lives;
            speedEl.innerText = (playerBaseSpeed + (level * 0.2)).toFixed(1);
        }

        // --- Controls ---
        const startAction = (e) => {
            if (e) e.preventDefault();
            player.isMoving = true;
        };
        const stopAction = (e) => {
            if (e) e.preventDefault();
            player.isMoving = false;
        };

        canvas.addEventListener('mousedown', startAction);
        window.addEventListener('mouseup', stopAction);
        canvas.addEventListener('touchstart', startAction, {passive: false});
        window.addEventListener('touchend', stopAction);

        actionBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            gameActive = true;
            initEnemies();
            updateStats();
        });

        // Initial Start UI
        showUI("NEON DASH", "Stay focused. Speed increases each level.", "Begin Mission");
        draw();
    });
</script>
</body>
</html>
