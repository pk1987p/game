<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - GameJio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .gradient-green-orange {
            background: linear-gradient(135deg, #10b981 0%, #f97316 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md">
        <div class="max-w-6xl mx-auto px-4 py-4">
            <a href="./index.html" class="text-2xl font-bold gradient-green-orange bg-clip-text text-transparent">🎮 GameJio</a>
        </div>
    </nav>

    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-md bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2 text-center">Join GameJio</h1>
            <p class="text-gray-600 text-center mb-8">Create an account to start playing</p>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                <span id="errorText"></span>
            </div>

            <!-- Success Message -->
            <div id="successMessage" class="hidden bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
                <span id="successText">Account created! Please check your email to confirm.</span>
            </div>

            <!-- Sign Up Form -->
            <form id="signupForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                    <input type="text" id="username" name="username" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200" placeholder="YourUsername">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200" placeholder="your@email.com">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                    <div class="relative">
                        <input type="password" id="password" name="password" required class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200" placeholder="••••••••">
                        <button type="button" class="absolute right-3 top-2.5 text-gray-500 hover:text-gray-700" onclick="togglePassword('password')">
                            <svg id="eyeIcon1" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 mt-1">At least 6 characters</p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Confirm Password</label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" name="confirmPassword" required class="w-full px-4 py-2 pr-10 border border-gray-300 rounded-lg focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-200" placeholder="••••••••">
                        <button type="button" class="absolute right-3 top-2.5 text-gray-500 hover:text-gray-700" onclick="togglePassword('confirmPassword')">
                            <svg id="eyeIcon2" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        </button>
                    </div>
                    <p id="passwordMatch" class="text-xs mt-1 hidden">Passwords match ✓</p>
                    <p id="passwordMismatch" class="text-xs text-red-600 mt-1 hidden">Passwords do not match ✗</p>
                </div>

                <div class="flex items-start gap-2">
                    <input type="checkbox" id="agreeTerms" name="agreeTerms" required class="mt-1">
                    <label for="agreeTerms" class="text-sm text-gray-600">
                        I agree to the <span class="text-green-600 font-semibold">Terms of Service</span> and <span class="text-green-600 font-semibold">Privacy Policy</span>
                    </label>
                </div>

                <button type="submit" id="signupBtn" class="w-full py-3 gradient-green-orange text-white font-bold rounded-lg hover:shadow-lg transform hover:scale-105 transition-all duration-200">
                    Create Account
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-4 my-6">
                <div class="flex-1 border-t border-gray-300"></div>
                <span class="text-gray-500 text-sm">or</span>
                <div class="flex-1 border-t border-gray-300"></div>
            </div>

            <!-- Login Link -->
            <p class="text-center text-gray-600">Already have an account? 
                <a href="./login.html" class="text-orange-600 font-bold hover:text-orange-700">Login</a>
            </p>
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script>
        // Password visibility toggle function
        function togglePassword(fieldId) {
            const field = document.getElementById(fieldId);
            const eyeIcon = fieldId === 'password' ? document.getElementById('eyeIcon1') : document.getElementById('eyeIcon2');
            
            if (field.type === 'password') {
                field.type = 'text';
            } else {
                field.type = 'password';
            }
        }

        // Real-time password match validation
        document.getElementById('password').addEventListener('input', validatePasswordMatch);
        document.getElementById('confirmPassword').addEventListener('input', validatePasswordMatch);

        function validatePasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const matchMsg = document.getElementById('passwordMatch');
            const mismatchMsg = document.getElementById('passwordMismatch');
            const confirmField = document.getElementById('confirmPassword');

            if (confirmPassword.length === 0) {
                matchMsg.classList.add('hidden');
                mismatchMsg.classList.add('hidden');
                confirmField.classList.remove('border-red-500', 'border-green-500');
                confirmField.classList.add('border-gray-300');
                return;
            }

            if (password === confirmPassword) {
                matchMsg.classList.remove('hidden');
                mismatchMsg.classList.add('hidden');
                confirmField.classList.remove('border-red-500', 'border-gray-300');
                confirmField.classList.add('border-green-500', 'border-2');
            } else {
                matchMsg.classList.add('hidden');
                mismatchMsg.classList.remove('hidden');
                confirmField.classList.remove('border-green-500', 'border-gray-300');
                confirmField.classList.add('border-red-500', 'border-2');
            }
        }

        // Supabase is already initialized in auth.js

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const username = document.getElementById('username').value;
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            const signupBtn = document.getElementById('signupBtn');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            // Validate passwords
            if (password !== confirmPassword) {
                errorDiv.classList.remove('hidden');
                document.getElementById('errorText').textContent = 'Passwords do not match!';
                return;
            }

            if (password.length < 6) {
                errorDiv.classList.remove('hidden');
                document.getElementById('errorText').textContent = 'Password must be at least 6 characters!';
                return;
            }

            // Check if Supabase is initialized
            const supabase = window.supabaseClient;
            if (!supabase) {
                errorDiv.classList.remove('hidden');
                if (supabaseError) {
                    document.getElementById('errorText').textContent = 'Authentication error: ' + supabaseError;
                } else {
                    document.getElementById('errorText').textContent = 'Authentication service is still loading. Please wait a moment and try again.';
                }
                return;
            }

            signupBtn.disabled = true;
            signupBtn.textContent = 'Creating Account...';

            // Sanitize username input
            const sanitizedUsername = sanitizeInput(username);

            try {
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            username: sanitizedUsername
                        }
                    }
                });

                if (error) throw error;

                successDiv.classList.remove('hidden');
                document.getElementById('signupForm').reset();

                // Optionally auto-login after signup
                setTimeout(() => {
                    window.location.href = './login.html';
                }, 2000);

            } catch (error) {
                console.error('Signup error:', error);
                errorDiv.classList.remove('hidden');
                document.getElementById('errorText').textContent = error.message || 'Signup failed. Please try again.';
            } finally {
                signupBtn.disabled = false;
                signupBtn.textContent = 'Create Account';
            }
        });

        // Check if already logged in
        window.addEventListener('load', () => {
            const user = JSON.parse(localStorage.getItem('gamejio_user'));
            if (user) {
                window.location.href = '/index.html';
            }
        });
    </script>
</body>
</html>
