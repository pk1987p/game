<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - GameJio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-green-orange {
            background: linear-gradient(135deg, #10b981 0%, #f97316 100%);
        }
        canvas {
            border: 3px solid #10b981;
            display: block;
            margin: 0 auto;
            background: #000;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Navigation -->
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="./index.html" class="text-xl font-bold gradient-green-orange bg-clip-text text-transparent">🎮 GameJio</a>
            <div class="flex items-center gap-4">
                <span id="userName" class="text-sm font-medium text-gray-700 hidden"></span>
                <button id="logoutBtn" class="px-4 py-2 bg-orange-500 text-white rounded-lg font-semibold hover:bg-orange-600 transition-colors text-sm hidden">
                    Logout
                </button>
                <a href="./login.html" class="px-4 py-2 bg-green-500 text-white rounded-lg font-semibold hover:bg-green-600 transition-colors text-sm" id="loginLink">
                    Login
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-lg p-6 md:p-8">
            <h1 class="text-4xl font-bold text-center gradient-green-orange bg-clip-text text-transparent mb-4">🐍 Snake Game</h1>
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-green-50 p-4 rounded-lg text-center">
                    <p class="text-gray-600 mb-2">Score</p>
                    <p id="score" class="text-3xl font-bold text-green-600">0</p>
                </div>
                <div class="bg-orange-50 p-4 rounded-lg text-center">
                    <p class="text-gray-600 mb-2">High Score</p>
                    <p id="highScore" class="text-3xl font-bold text-orange-600">0</p>
                </div>
                <div class="bg-blue-50 p-4 rounded-lg text-center">
                    <p class="text-gray-600 mb-2">Level</p>
                    <p id="level" class="text-3xl font-bold text-blue-600">1</p>
                </div>
            </div>

            <div class="bg-gray-900 rounded-lg overflow-hidden mb-8">
                <canvas id="gameCanvas" width="400" height="400" class="w-full"></canvas>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
                <button id="startBtn" class="py-3 gradient-green-orange text-white font-bold rounded-lg hover:shadow-lg text-lg">
                    Start Game
                </button>
                <button id="pauseBtn" class="py-3 bg-blue-500 text-white font-bold rounded-lg hover:shadow-lg text-lg" disabled>
                    Pause
                </button>
            </div>

            <div class="bg-blue-50 p-6 rounded-lg">
                <h3 class="text-lg font-bold text-gray-800 mb-3">How to Play</h3>
                <ul class="space-y-2 text-gray-700">
                    <li>🎮 Use <strong>Arrow Keys</strong> to move the snake</li>
                    <li>📱 On mobile, use <strong>swipe gestures</strong></li>
                    <li>🍎 Eat red food to grow and gain points</li>
                    <li>⚠️ Don't hit the walls or yourself!</li>
                    <li>⭐ Each food eaten increases game speed</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="./js/auth.js"></script>
    <script src="./js/app.js"></script>
    <script>
        protectGamePage();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const highScoreDisplay = document.getElementById('highScore');
        const levelDisplay = document.getElementById('level');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');

        let gameRunning = false;
        let gamePaused = false;
        let score = 0;
        let level = 1;
        let highScore = getHighScore('Snake');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{ x: 10, y: 10 }];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 15, y: 15 };
        let speed = 100;

        highScoreDisplay.textContent = highScore;

        function drawRect(x, y, size, color) {
            ctx.fillStyle = color;
            ctx.fillRect(x * gridSize, y * gridSize, size, size);
        }

        function drawGame() {
            // Clear canvas
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw snake
            snake.forEach((segment, i) => {
                drawRect(segment.x, segment.y, gridSize - 1, i === 0 ? '#10b981' : '#4ade80');
            });

            // Draw food
            drawRect(food.x, food.y, gridSize - 1, '#ef4444');

            // Draw grid
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function update() {
            if (!gameRunning || gamePaused) return;

            direction = nextDirection;

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // Check collision with walls
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            // Check collision with self
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Check if food is eaten
            if (head.x === food.x && head.y === food.y) {
                score += 10 * level;
                level = Math.floor(score / 100) + 1;
                speed = 100 - (level - 1) * 5;

                scoreDisplay.textContent = score;
                levelDisplay.textContent = level;

                // Generate new food
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } else {
                snake.pop();
            }

            drawGame();
        }

        function gameLoop() {
            update();
            setTimeout(gameLoop, speed);
        }

        function startGame() {
            if (!gameRunning) {
                gameRunning = true;
                gamePaused = false;
                startBtn.textContent = 'Restart';
                pauseBtn.disabled = false;
                gameLoop();
            }
        }

        function endGame() {
            gameRunning = false;
            gamePaused = false;
            startBtn.textContent = 'Start Game';
            pauseBtn.disabled = true;
            pauseBtn.textContent = 'Pause';

            if (score > highScore) {
                highScore = score;
                highScoreDisplay.textContent = highScore;
            }

            showGameOverScreen(score, 'Snake', () => {
                score = 0;
                level = 1;
                speed = 100;
                snake = [{ x: 10, y: 10 }];
                direction = { x: 1, y: 0 };
                nextDirection = { x: 1, y: 0 };
                food = { x: 15, y: 15 };
                scoreDisplay.textContent = 0;
                levelDisplay.textContent = 1;
                drawGame();
                startGame();
            });
        }

        startBtn.addEventListener('click', startGame);

        pauseBtn.addEventListener('click', () => {
            gamePaused = !gamePaused;
            pauseBtn.textContent = gamePaused ? 'Resume' : 'Pause';
        });

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp':
                    if (direction.y === 0) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                    if (direction.y === 0) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                    if (direction.x === 0) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                    if (direction.x === 0) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });

        // Touch controls
        addTouchControls(canvas,
            () => { if (direction.x === 0) nextDirection = { x: -1, y: 0 }; },
            () => { if (direction.x === 0) nextDirection = { x: 1, y: 0 }; },
            null
        );

        document.addEventListener('DOMContentLoaded', () => {
            initGamePage('Snake');
            drawGame();
        });
    </script>
</body>
</html>
